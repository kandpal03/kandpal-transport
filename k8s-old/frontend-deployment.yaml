apiVersion: apps/v1
kind: Deployment
metadata:
  name: kandpal-frontend
  namespace: kandpal-transport
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kandpal-frontend
  template:
    metadata:
      labels:
        app: kandpal-frontend
    spec:
      containers:
        - name: frontend
          image: kandpal03/kandpal-transport-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80