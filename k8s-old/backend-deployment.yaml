apiVersion: apps/v1
kind: Deployment
metadata:
  name: kandpal-backend
  namespace: kandpal-transport
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kandpal-backend
  template:
    metadata:
      labels:
        app: kandpal-backend
    spec:
      containers:
        - name: backend
          image: kandpal03/kandpal-transport-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"